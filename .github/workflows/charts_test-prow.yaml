name: Charts Test - Prow

on:
  pull_request:
    branches: [main]
    paths:
      - "charts/prow/**"

jobs:
  chart-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.8.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: 3.14

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Setup Kubernetes
        uses: engineerd/setup-kind@aa272fe2a7309878ffc2a81c56cfe3ef108ae7d0 # v0.5.0
        with:
          # renovate: datasource=go depName=sigs.k8s.io/kind
          version: v0.12.0

      - name: Add test optional files for charts/prow
        env:
          ORG_NAME: ${{ github.event.repository.owner.login }}
          PROW_APP_ID: ${{ secrets.PROW_APP_ID }}
          PROW_APP_CERT: ${{ secrets.PROW_APP_CERT }}
          PROW_HMAC_TOKEN: ${{ secrets.PROW_HMAC_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ns=prow && kubectl create ns $ns

          # jenkins secret
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: prow-jenkins
            namespace: $ns
          stringData:
            jenkins-admin-user: test
            jenkins-admin-password: test
          EOF

          # prow-github secret
          cat <<EOF > prow-github.yaml
          apiVersion: v1
          kind: Secret
          metadata:
            name: prow-github
          stringData:
            app-id: ""
            app-private-key: ""
            token: ""
            secret: |
              client_id: fake-client-id
              client_secret: fake-client-secret
              redirect_url: https://prow.test.io/github-login/redirect
              final_redirect_url: https://prow.test.io/pr

          EOF
          prow_test_app_id="${PROW_APP_ID}"
          prow_test_app_cert="${PROW_APP_CERT}"
          if [ -z "$prow_test_app_id" ] || [ -z "$prow_test_app_cert" ]; then
            prow_test_app_id="1"
            prow_test_app_cert="$(openssl genrsa -traditional 2048 2>/dev/null || openssl genrsa 2048)"
          fi
          export prow_test_app_id prow_test_app_cert GITHUB_TOKEN
          yq -i e '.stringData["app-id"] = strenv(prow_test_app_id)' prow-github.yaml
          yq -i e '.stringData["app-private-key"] = strenv(prow_test_app_cert)' prow-github.yaml
          yq -i e '.stringData["token"] = strenv(GITHUB_TOKEN)' prow-github.yaml
          kubectl -n $ns apply -f prow-github.yaml && rm prow-github.yaml
          # prow-webhook secret
          prow_test_hmac="${PROW_HMAC_TOKEN}"
          if [ -z "$prow_test_hmac" ]; then
            prow_test_hmac="$(openssl rand -hex 32)"
          fi
          kubectl -n $ns create secret generic prow-webhook --from-literal hmac="$prow_test_hmac"

          # prow-oauth-cookie secret
          kubectl -n $ns create secret generic prow-oauth-cookie --from-literal secret="$(openssl rand -base64 32)"

          # setup configMaps
          orgName="$ORG_NAME"
          sed -iE "s/exampleOrg/${orgName}/g" .github/workflows/test-data/prow/configs/config.yaml
          sed -iE "s/exampleOrg/${orgName}/g" .github/workflows/test-data/prow/configs/plugins.yaml
          kubectl -n $ns create cm prow-config --from-file .github/workflows/test-data/prow/configs/config.yaml
          kubectl -n $ns create cm prow-plugin --from-file .github/workflows/test-data/prow/configs/plugins.yaml
          kubectl -n $ns create cm prow-job --from-file .github/workflows/test-data/prow/configs/job-1.yaml

          kubectl -n prow get cm
          kubectl -n prow get secrets
      - name: Setup prow CRD
        run: |
          kubectl create -f https://raw.githubusercontent.com/kubernetes/test-infra/master/config/prow/cluster/prowjob-crd/prowjob_customresourcedefinition.yaml

      - name: Run chart-testing (install)
        run: |
          ct install \
            --charts charts/prow \
            --chart-repos "bitnami=https://charts.bitnami.com/bitnami" \
            --chart-repos "self=https://pingcap-qe.github.io/ee-ops" \
            --helm-extra-set-args '-f .github/workflows/test-data/prow/ct-values.yaml' \
            --namespace prow \
            --debug
