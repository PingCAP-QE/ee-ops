apiVersion: batch/v1
kind: CronJob
metadata:
  name: roster-sync
  namespace: apps
  labels:
    app.kubernetes.io/name: roster-sync
    app.kubernetes.io/part-of: roster
spec:
  schedule: "0 3 * * *"
  timeZone: Asia/Shanghai
  suspend: false
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: roster-sync
            app.kubernetes.io/part-of: roster
        spec:
          restartPolicy: Never
          containers:
            - name: sync-roster
              image: ghcr.io/pingcap-qe/ee-apps/roster-jobs:v2026.5.24-2-g7f5f498
              imagePullPolicy: IfNotPresent
              args:
                - sync-roster
              envFrom:
                - secretRef:
                    name: ci-dashboard-eq-prd-insight-db
                - secretRef:
                    name: roster-lark
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: ROSTER_LOG_LEVEL
                  value: "INFO"
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: roster-weekly-summary
  namespace: apps
  labels:
    app.kubernetes.io/name: roster-weekly-summary
    app.kubernetes.io/part-of: roster
spec:
  schedule: "10 10 * * 1"
  timeZone: Asia/Shanghai
  suspend: false
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: roster-weekly-summary
            app.kubernetes.io/part-of: roster
        spec:
          restartPolicy: Never
          containers:
            - name: weekly-summary
              image: ghcr.io/pingcap-qe/ee-apps/roster-jobs:v2026.5.24-2-g7f5f498
              imagePullPolicy: IfNotPresent
              args:
                - weekly-summary
                - --send-lark
              envFrom:
                - secretRef:
                    name: ci-dashboard-eq-prd-insight-db
                - secretRef:
                    name: roster-lark
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: ROSTER_LOG_LEVEL
                  value: "INFO"
                - name: ROSTER_LARK_NOTIFY_OPEN_ID
                  value: "ou_305fc38fd60e3f64a60296cf9afeb7f7"
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
