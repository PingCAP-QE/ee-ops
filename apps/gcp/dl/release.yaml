apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dl
spec:
  chart:
    spec:
      chart: dl
      version: 0.2.1
      sourceRef:
        kind: HelmRepository
        name: ee-apps
        namespace: flux-system
  interval: 5m
  timeout: 5m
  install:
    remediation:
      retries: 3
  rollback:
    cleanupOnFail: true
    recreate: true
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  test:
    enable: true
    ignoreFailures: false
  values:
    replicaCount: 1
    resources:
      limits:
        cpu: "500m"
        memory: 512Mi
    image:
      repository: ghcr.io/pingcap-qe/ee-apps/dl
      # renovate: datasource=docker depName=ghcr.io/pingcap-qe/ee-apps/dl versioning=docker
      tag: v2026.6.28-20-g343ff73
    server:
      args:
        - --domain=0.0.0.0:80
        - --ks3-config=/config/ks3.yaml
        - --oci-config=/config/oci.yaml
      volumes:
        - name: config
          secret:
            secretName: dl-config
      volumeMounts:
        - name: config
          mountPath: /config
    serviceAccount:
      create: true
      annotations:
        iam.gke.io/gcp-service-account: hotfix-binaries-reader@pingcap-testing-account.iam.gserviceaccount.com
    httpRoute:
      enabled: false
