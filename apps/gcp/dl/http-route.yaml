apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dl
spec:
  parentRefs:
    - kind: Gateway
      name: external-https
      namespace: infra
  hostnames:
    - prow.tidb.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /dl
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      # Large artifact downloads are streamed for minutes. The GCPBackendPolicy
      # (backend-policy.yaml) overrides the default 30s backend timeout to 1h.
      backendRefs:
        - name: dl
          port: 80
