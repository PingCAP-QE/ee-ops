apiVersion: batch/v1
kind: CronJob
metadata:
  name: cost-insight-sync-gcp-billing-summary
  namespace: apps
  labels:
    app.kubernetes.io/name: cost-insight-sync-gcp-billing-summary
    app.kubernetes.io/part-of: cost-insight
spec:
  # Interpreted with timeZone below: 21:10 Asia/Shanghai, intentionally outside BJ work time.
  schedule: "10 21 * * *"
  timeZone: Asia/Shanghai
  suspend: false
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 4
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cost-insight-sync-gcp-billing-summary
            app.kubernetes.io/part-of: cost-insight
        spec:
          # Reuse the existing Workload Identity path; the bound GSA must have
          # BigQuery jobUser plus billing export dataset read access.
          serviceAccountName: ci-dashboard
          restartPolicy: Never
          containers:
            - name: sync-gcp-billing-summary
              image: ghcr.io/pingcap-qe/ee-apps/cost-insight-jobs:v2026.5.31-3-gf1df263
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
              args:
                - |
                  summary_json_path=/tmp/summary.json
                  cost-insight sync-gcp-billing-summary > "${summary_json_path}"
                  cat "${summary_json_path}"
                  dates="$(python - <<'PY'
                  import json

                  with open("/tmp/summary.json", encoding="utf-8") as f:
                      payload = json.load(f)
                  if isinstance(payload, dict):
                      payloads = [payload]
                  else:
                      payloads = payload or []
                  dates = []
                  for item in payloads:
                      dates.extend(item.get("touched_usage_dates") or [])
                  if dates:
                      print(min(dates), max(dates))
                  PY
                  )"
                  if [ -n "${dates}" ]; then
                    set -- ${dates}
                    cost-insight refresh-cost-attribution-from-summary \
                      --start-date "$1" \
                      --end-date "$2" \
                      --split-by-day
                  else
                    echo "No touched usage dates returned; skip attribution refresh."
                  fi
              envFrom:
                - secretRef:
                    name: ci-dashboard-eq-prd-insight-db
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: COST_INSIGHT_LOG_LEVEL
                  value: INFO
                - name: GOOGLE_CLOUD_PROJECT
                  value: pingcap-testing-account
                - name: COST_INSIGHT_GCP_ACCOUNT_ID
                  value: pingcap-testing-account
                - name: COST_INSIGHT_GCP_BILLING_TABLE
                  value: gcp-digital-bi.gcp_billing_detailed.gcp_billing_export_resource_v1_01D088_8F9CF2_8AF1C6
                - name: COST_INSIGHT_SYNC_LAG_DAYS
                  value: "5"
                - name: COST_INSIGHT_EXPORT_OVERLAP_DAYS
                  value: "0"
                - name: COST_INSIGHT_SYNC_PAGE_SIZE
                  value: "5000"
              resources:
                requests:
                  cpu: "500m"
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cost-insight-sync-gcs-cache-last-seen
  namespace: apps
  labels:
    app.kubernetes.io/name: cost-insight-sync-gcs-cache-last-seen
    app.kubernetes.io/part-of: cost-insight
spec:
  # Interpreted with timeZone below: 22:20 Asia/Shanghai, after the other daily cost jobs.
  schedule: "20 22 * * *"
  timeZone: Asia/Shanghai
  # Keep suspended until the ee-apps image tag is updated to a release that includes
  # the new GCS cache cleanup commands.
  suspend: true
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 4
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cost-insight-sync-gcs-cache-last-seen
            app.kubernetes.io/part-of: cost-insight
        spec:
          # Reuse the existing Workload Identity path; the bound GSA must have
          # BigQuery jobUser plus read/write access to ci_bazel_cache_logs.
          serviceAccountName: ci-dashboard
          restartPolicy: Never
          containers:
            - name: sync-gcs-cache-last-seen
              image: ghcr.io/pingcap-qe/ee-apps/cost-insight-jobs:v2026.5.31-3-gf1df263
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
              args:
                - |
                  cost-insight sync-gcs-cache-last-seen
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: COST_INSIGHT_LOG_LEVEL
                  value: INFO
                - name: GOOGLE_CLOUD_PROJECT
                  value: pingcap-testing-account
                - name: COST_INSIGHT_GCS_CACHE_PROJECT_ID
                  value: pingcap-testing-account
                - name: COST_INSIGHT_GCS_CACHE_BUCKET_NAME
                  value: pingcap-ci-bazel-remote-cache-us-central1
                - name: COST_INSIGHT_GCS_CACHE_DATASET
                  value: ci_bazel_cache_logs
                - name: COST_INSIGHT_GCS_CACHE_AUDIT_LOG_TABLE
                  value: cloudaudit_googleapis_com_data_access
              resources:
                requests:
                  cpu: "500m"
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cost-insight-cleanup-gcs-cache-dry-run
  namespace: apps
  labels:
    app.kubernetes.io/name: cost-insight-cleanup-gcs-cache-dry-run
    app.kubernetes.io/part-of: cost-insight
spec:
  # Interpreted with timeZone below: Monday 22:50 Asia/Shanghai, after the daily
  # last-seen sync has refreshed the previous UTC day.
  schedule: "50 22 * * 1"
  timeZone: Asia/Shanghai
  # Keep suspended until the ee-apps image tag is updated to a release that includes
  # the new GCS cache cleanup commands.
  suspend: true
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 4
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cost-insight-cleanup-gcs-cache-dry-run
            app.kubernetes.io/part-of: cost-insight
        spec:
          # This first slice is BigQuery-only and does not perform deletes.
          serviceAccountName: ci-dashboard
          restartPolicy: Never
          containers:
            - name: cleanup-gcs-cache-dry-run
              image: ghcr.io/pingcap-qe/ee-apps/cost-insight-jobs:v2026.5.31-3-gf1df263
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
              args:
                - |
                  cost-insight cleanup-gcs-cache \
                    --mode dry-run \
                    --ac-retention-days 28 \
                    --cas-retention-days 42
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: COST_INSIGHT_LOG_LEVEL
                  value: INFO
                - name: GOOGLE_CLOUD_PROJECT
                  value: pingcap-testing-account
                - name: COST_INSIGHT_GCS_CACHE_PROJECT_ID
                  value: pingcap-testing-account
                - name: COST_INSIGHT_GCS_CACHE_BUCKET_NAME
                  value: pingcap-ci-bazel-remote-cache-us-central1
                - name: COST_INSIGHT_GCS_CACHE_DATASET
                  value: ci_bazel_cache_logs
                - name: COST_INSIGHT_GCS_CACHE_AUDIT_LOG_TABLE
                  value: cloudaudit_googleapis_com_data_access
                - name: COST_INSIGHT_GCS_CACHE_AC_RETENTION_DAYS
                  value: "28"
                - name: COST_INSIGHT_GCS_CACHE_CAS_RETENTION_DAYS
                  value: "42"
              resources:
                requests:
                  cpu: "500m"
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cost-insight-sync-gcp-unmatched-resources
  namespace: apps
  labels:
    app.kubernetes.io/name: cost-insight-sync-gcp-unmatched-resources
    app.kubernetes.io/part-of: cost-insight
spec:
  # Interpreted with timeZone below: Monday 22:10 Asia/Shanghai.
  schedule: "10 22 * * 1"
  timeZone: Asia/Shanghai
  suspend: false
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 4
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cost-insight-sync-gcp-unmatched-resources
            app.kubernetes.io/part-of: cost-insight
        spec:
          # Reuse Workload Identity because this job scans resource-level BigQuery data.
          serviceAccountName: ci-dashboard
          restartPolicy: Never
          containers:
            - name: sync-gcp-unmatched-resources
              image: ghcr.io/pingcap-qe/ee-apps/cost-insight-jobs:v2026.5.31-3-gf1df263
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
              args:
                - |
                  dates="$(python - <<'PY'
                  from datetime import datetime, timedelta, timezone
                  import os

                  lag_days = int(os.environ.get("COST_INSIGHT_UNMATCHED_RESOURCE_LAG_DAYS", "5"))
                  stable_date = datetime.now(timezone.utc).date() - timedelta(days=lag_days)
                  end_date = stable_date - timedelta(days=stable_date.weekday() + 1)
                  start_date = end_date - timedelta(days=6)
                  print(start_date.isoformat(), end_date.isoformat())
                  PY
                  )"
                  set -- ${dates}
                  cost-insight sync-gcp-unmatched-resources \
                    --usage-start-date "$1" \
                    --usage-end-date "$2"
              envFrom:
                - secretRef:
                    name: ci-dashboard-eq-prd-insight-db
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: COST_INSIGHT_LOG_LEVEL
                  value: INFO
                - name: GOOGLE_CLOUD_PROJECT
                  value: pingcap-testing-account
                - name: COST_INSIGHT_GCP_ACCOUNT_ID
                  value: pingcap-testing-account
                - name: COST_INSIGHT_GCP_BILLING_TABLE
                  value: gcp-digital-bi.gcp_billing_detailed.gcp_billing_export_resource_v1_01D088_8F9CF2_8AF1C6
                - name: COST_INSIGHT_UNMATCHED_RESOURCE_LAG_DAYS
                  value: "5"
                - name: COST_INSIGHT_SYNC_PAGE_SIZE
                  value: "5000"
              resources:
                requests:
                  cpu: "500m"
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
---
