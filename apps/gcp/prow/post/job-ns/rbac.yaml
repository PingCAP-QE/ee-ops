apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-pod-full
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: k8s-pod-full
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - delete
      - list
      - get
      - watch
      - create
      - patch
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: k8s-pod-full
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: k8s-pod-full
subjects:
  - kind: ServiceAccount
    name: k8s-pod-full
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tidbx-puller
  annotations:
    iam.gke.io/gcp-service-account: tidbx-gar-reader@pingcap-testing-account.iam.gserviceaccount.com
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: terraform-plan-reader
  annotations:
    iam.gke.io/gcp-service-account: terraform-plan-reader@pingcap-testing-account.iam.gserviceaccount.com
