# This ExternalSecret reads both .htpasswd and password from a single GCP SM key.
# To create/update the secret in GCP Secret Manager:
#
#   USERNAME="your-username"
#   PASSWORD="your-plaintext-password"
#   HTPASSWD=$(htpasswd -nbs "$USERNAME" "$PASSWORD")
#   echo "{\"htpasswd\": \"${HTPASSWD}\", \"username\": \"$USERNAME\", \"password\": \"$PASSWORD\"}" | \
#     gcloud secrets create publisher-auth --data-file=-
#
# When you change the password, update this one GCP SM key and both Secrets
# (httproute-auth-secret + publisher-auth) will sync automatically.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: httproute-auth-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ee-gcp-sm
    kind: ClusterSecretStore
  target:
    name: httproute-auth-secret
    creationPolicy: Owner
    template:
      data:
        .htpasswd: "{{ .htpasswd }}"
  dataFrom:
    - extract:
        key: publisher-auth
