apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
spec:
  chart:
    spec:
      chart: redis
      version: 20.2.1
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  interval: 1h
  values:
    global:
      storageClass: standard-rwo
    master:
      resourcesPreset: nano
    replica:
      resourcesPreset: nano
    auth:
      existingSecret: redis
      existingSecretPasswordKey: REDIS_PASSWORD
