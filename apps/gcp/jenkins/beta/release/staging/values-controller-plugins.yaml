# please see: https://github.com/jenkinsci/helm-charts/blob/main/charts/jenkins/VALUES_SUMMARY.md
controller:
  overwritePlugins: true
  installLatestPlugins: true

  # Override the default list to use our own custom plugin
  # Ref: https://artifacthub.io/packages/helm/jenkinsci/jenkins?modal=values&path=controller.installPlugins
  installPlugins:
    - kubernetes:4437.vd64141124d8f-fork.2:https://github.com/wuhuizuo/jenkins-kubernetes-plugin/releases/download/4437.vd64141124d8f-fork.2/kubernetes.hpi
    - workflow-aggregator:608.v67378e9d3db_1
    - git:5.10.1
    - configuration-as-code:2077.v41f1011a_5110

  # List of plugins to install in addition to those listed in controller.installPlugins
  additionalPlugins:
    # Ref: https://github.com/jenkinsci/plugin-installation-manager-tool#plugin-input-format
    # but without outer `plugin` key.
    - artifact-manager-s3:973.v6a_51253e896b_
    - build-failure-analyzer::https://github.com/PingCAP-QE/build-failure-analyzer-plugin/releases/download/v2.4.2-jobname/build-failure-analyzer.hpi
    - cdevents::https://github.com/dillon-zheng/cdevents-plugin/releases/download/cdevents-1-40-pingcap-1/cdevents-1-40-pingcap-1.hpi
    # PingCAP fork: skip withCredentials cleanup when the agent is offline, so a lost agent
    # (e.g. preempted Kubernetes pod) under `retry` no longer fails the build on cleanup.
    # Ref: jenkinsci/credentials-binding-plugin#530 (fixes #531)
    - credentials-binding:725.ve52b_2328a_fde-fork.2:https://github.com/wuhuizuo/credentials-binding-plugin/releases/download/725.ve52b_2328a_fde-fork.2/credentials-binding-725.ve52b_2328a_fde-fork.2.hpi
    # PingCAP fork: when a lost agent times out (RemovedNodeTimeoutCause), do not flag the
    # interruption as an actual (user-initiated) abort. This allows declarative agent retries
    # to re-run stages cleanly on the re-provisioned agent instead of aborting after SCM checkout.
    - workflow-durable-task-step:1479.v56e587f413a_7-fork.1:https://github.com/wuhuizuo/workflow-durable-task-step-plugin/releases/download/1479.v56e587f413a_7-fork.1/workflow-durable-task-step.hpi
    - generic-webhook-trigger:2.4.1
    - google-login:109.v022b_cf87b_e5b_
    - http_request:1.25
    - jenkins-pipeline-cache:0.2.0:https://github.com/j3t/jenkins-pipeline-cache-plugin/releases/download/0.2.0/jenkins-pipeline-cache-0.2.0.hpi
    - job-dsl:3654.vdf58f53e2d15
    - kubernetes-credentials-provider:1.303.vdfcf47fb_b_fef
    - lockable-resources:1469.v52dff5a_80e32
    - pipeline-graph-view:836.v68ef091500dd
    - pipeline-utility-steps:3.810.va_7672d206740
    - prometheus:852.v317db_5d17a_b_0
    - role-strategy:840.v206ff7f7312e
    - ssh-agent:396.vcc7d84e622ec

  initializeOnce: false

  # for plugin build-failure-analyzer
  #   Exporting to prometheus
  #   Ref: https://github.com/jenkinsci/build-failure-analyzer-plugin/blob/master/docs/metrics.md
  prometheus:
    metricRelabelings:
      # add label: category
      - sourceLabels: [__name__]
        regex: jenkins_bfa_category_(.*)
        targetLabel: category
      - sourceLabels: [__name__]
        regex: jenkins_bfa_job_category:_:.*:_:(.*)
        targetLabel: category

      # add label: cause
      - sourceLabels: [__name__]
        regex: jenkins_bfa_cause_(.*)
        targetLabel: cause
      - sourceLabels: [__name__]
        regex: jenkins_bfa_job_cause:_:.*:_:(.*)
        targetLabel: cause

      # add label: jobname
      - sourceLabels: [__name__]
        regex: jenkins_bfa_job_category:_:(.*):_:.*
        targetLabel: jobname
      - sourceLabels: [__name__]
        regex: jenkins_bfa_job_cause:_:(.*):_:.*
        targetLabel: jobname

      # aggerate to uniq metric: jenkins_bfa
      - sourceLabels: [__name__]
        regex: jenkins_bfa_(.*)_(.*)
        replacement: jenkins_bfa
        targetLabel: __name__
