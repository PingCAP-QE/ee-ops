apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: restrict-to-node-instance-types
spec:
  rules:
    - name: restrict-pods-running-on-spot-nodes
      match:
        resources:
          kinds:
            - Pod
      mutate:
        patchStrategicMerge:
          metadata:
            annotations:
              cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
          spec:
            nodeSelector:
              cloud.google.com/compute-class: ci-worker
