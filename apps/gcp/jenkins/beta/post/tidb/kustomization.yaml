apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jenkins-tidb
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - ../_base
configMapGenerator:
  - name: bazel
    options:
      disableNameSuffixHash: true
    files:
      - files/bazel
      - files/bazel-prepare-in-container.sh
