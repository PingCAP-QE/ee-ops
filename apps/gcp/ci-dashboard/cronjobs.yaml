apiVersion: batch/v1
kind: CronJob
metadata:
  name: ci-dashboard-sync-builds
  namespace: apps
  labels:
    app.kubernetes.io/name: ci-dashboard-sync-builds
    app.kubernetes.io/part-of: ci-dashboard
spec:
  schedule: "5 * * * *"
  timeZone: Asia/Shanghai
  suspend: false
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ci-dashboard-sync-builds
            app.kubernetes.io/part-of: ci-dashboard
        spec:
          restartPolicy: Never
          containers:
            - name: sync-builds
              image: ghcr.io/pingcap-qe/ee-apps/ci-dashboard-jobs:v2026.4.19-3-gca3e999
              imagePullPolicy: IfNotPresent
              args: ["sync-builds"]
              envFrom:
                - secretRef:
                    name: ci-dashboard-eq-prd-insight-db
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: CI_DASHBOARD_LOG_LEVEL
                  value: INFO
              resources:
                requests:
                  cpu: "1"
                  memory: 2Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
---
