apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - release.yaml
  - cronjobs.yaml
  - jenkins-worker.yaml
  - sync-pods-rbac.yaml
replacements:
  - source:
      kind: HelmRelease
      name: ci-dashboard
      fieldPath: spec.values.image.tag
    targets:
      - select:
          kind: CronJob
        fieldPaths:
          - spec.jobTemplate.spec.template.spec.containers.0.image
        options:
          delimiter: ":"
          index: 1
      - select:
          kind: Deployment
          name: ci-dashboard-jenkins-worker
        fieldPaths:
          - spec.template.spec.containers.0.image
        options:
          delimiter: ":"
          index: 1
