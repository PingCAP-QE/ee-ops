apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ci-dashboard
  namespace: apps
spec:
  releaseName: ci-dashboard
  chart:
    spec:
      chart: ci-dashboard
      version: 0.3.2
      sourceRef:
        kind: HelmRepository
        name: ee-apps
        namespace: flux-system
  interval: 5m
  timeout: 5m
  install:
    remediation:
      retries: 3
  rollback:
    cleanupOnFail: true
    recreate: true
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  test:
    enable: true
    ignoreFailures: false
  values:
    replicaCount: 1
    nodeSelector:
      kubernetes.io/arch: amd64
    image:
      repository: ghcr.io/pingcap-qe/ee-apps/ci-dashboard
      # renovate: datasource=docker depName=ghcr.io/pingcap-qe/ee-apps/ci-dashboard versioning=semver
      tag: v2026.7.12-4-g5c3f370
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
      limits:
        cpu: "4"
        memory: 8Gi
    env:
      - name: CI_DASHBOARD_LOG_LEVEL
        value: INFO
      - name: CI_DASHBOARD_ENABLE_RUNTIME_INSIGHTS
        value: "true"
      - name: CI_DASHBOARD_ENABLE_COST_DASHBOARD
        value: "true"
    serviceAccount:
      annotations:
        iam.gke.io/gcp-service-account: ci-dashboard@pingcap-testing-account.iam.gserviceaccount.com
    httpRoute:
      enabled: true
      parentRefs:
        - kind: Gateway
          name: external-https
          namespace: infra
      hostnames:
        - prow.tidb.net
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /dashboard/
          filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  type: ReplacePrefixMatch
                  replacePrefixMatch: /
    secretEnvFrom:
      - ci-dashboard-eq-prd-insight-db
