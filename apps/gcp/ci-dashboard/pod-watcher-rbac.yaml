apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ci-dashboard-pod-watcher
  labels:
    app.kubernetes.io/name: ci-dashboard-pod-watcher
    app.kubernetes.io/part-of: ci-dashboard
rules:
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
---
# Bind the shared ClusterRole separately in each watched namespace so the
# service account cannot watch pods/events cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-dashboard-pod-watcher
  namespace: prow-test-pods
  labels:
    app.kubernetes.io/name: ci-dashboard-pod-watcher
    app.kubernetes.io/part-of: ci-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ci-dashboard-pod-watcher
subjects:
  - kind: ServiceAccount
    name: ci-dashboard
    namespace: apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-dashboard-pod-watcher
  namespace: jenkins-tidb
  labels:
    app.kubernetes.io/name: ci-dashboard-pod-watcher
    app.kubernetes.io/part-of: ci-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ci-dashboard-pod-watcher
subjects:
  - kind: ServiceAccount
    name: ci-dashboard
    namespace: apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-dashboard-pod-watcher
  namespace: jenkins-tiflow
  labels:
    app.kubernetes.io/name: ci-dashboard-pod-watcher
    app.kubernetes.io/part-of: ci-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ci-dashboard-pod-watcher
subjects:
  - kind: ServiceAccount
    name: ci-dashboard
    namespace: apps
