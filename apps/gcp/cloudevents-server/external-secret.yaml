apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudevents-server-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: ee-gcp-sm
  target:
    name: cloudevents-server-config
    creationPolicy: Owner
  data:
    - secretKey: config.yaml
      remoteRef:
        # Expected mapping in gcp_cloudevents-server-config-yaml:
        # kafka.producer.topic_mapping.dev.cdevents.pipelinerun.finished.0.1.0: jenkins-event
        key: gcp_cloudevents-server-config-yaml
