apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: zot
spec:
  chart:
    spec:
      chart: zot
      # renovate: datasource=helm depName=zot registryUrl=https://zotregistry.dev/helm-charts
      version: 0.1.104
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: project-zot
  dependsOn:
    - name: redis
  interval: 1h
  values:
    mountSecret: true
    secretFiles: false # We are in charge of managing it(the secret `zot-secret`)
    mountConfig: true
    configFiles: false # We are in charge of managing it(the config map `zot-config`)
    httpRoute:
      enabled: true
      parentRefs:
        - kind: Gateway
          name: internal-gateway
          namespace: infra
      hostnames:
        - hub-zot.pingcap.net
    persistence: true
    pvc:
      accessMode: ReadWriteOnce
      create: true
      storage: 8Gi
      storageClassName: openebs-3-replicas
    replicaCount: 2
    service:
      type: ClusterIP

    # Relax probes to avoid restart loops during zot cold start
    startupProbe:
      httpGet:
        path: /startupz
        port: 5000
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 30

    readinessProbe:
      httpGet:
        path: /readyz
        port: 5000
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6

    livenessProbe:
      httpGet:
        path: /livez
        port: 5000
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
