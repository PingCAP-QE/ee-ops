apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dl-internal
spec:
  parentRefs:
    - kind: Gateway
      name: internal-gateway
      namespace: infra
  hostnames:
    - internal2-do.pingcap.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /dl
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      # Large artifact downloads are streamed for minutes, so the default
      # Gateway/Envoy request timeout must be disabled on this route.
      timeouts:
        request: 0s
      backendRefs:
        - name: dl
          port: 80
