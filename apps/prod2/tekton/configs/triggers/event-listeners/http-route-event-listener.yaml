apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: el-github
spec:
  parentRefs:
    - kind: Gateway
      name: external-https
      namespace: infra
  hostnames:
    - "${domain}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "${path_for_el_github}"
      backendRefs:
        - name: el-github
          port: 8080
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
