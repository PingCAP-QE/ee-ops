apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ee-gcp-sm
    kind: ClusterSecretStore
  target:
    name: github
    creationPolicy: Owner
  data:
    - secretKey: bot-token
      remoteRef:
        key: github-bot-token
