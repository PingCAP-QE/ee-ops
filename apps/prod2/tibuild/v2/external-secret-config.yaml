apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: v2-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: ee-gcp-sm
  target:
    name: v2-config
    template:
      type: Opaque
      data:
        config.yaml: |
          store:
            driver: mysql
            dsn: {{ .dsn }}

          tekton:
            cloudevent_endpoint: https://internal2-do.pingcap.net/tekton/hook-tibuild
            view_url: https://internal2-do.pingcap.net/tekton
            oci_file_download_url: "https://internal2-do.pingcap.net/dl/oci-file"
            reconciler_interval: 15s
            reconciler_since: 4h
          lark:
            enabled: true
            webhook_url: {{ .lark_webhook_url }}
          github:
            token: {{ .github_token }}

          product_repo_map:
            pd: tikv/pd
            tikv: tikv/tikv
            tiflash: pingcap/tiflash
            tidb: pingcap/tidb
            ticdc: pingcap/ticdc
            dm: pingcap/tiflow

  data:
    - secretKey: github_token
      remoteRef:
        key: github-bot-token
    - secretKey: dsn
      remoteRef:
        key: prod2_tibuild_v2_dsn
    - secretKey: lark_webhook_url
      remoteRef:
        key: prod2_tibuild_v2_lark_webhook_url_debug
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ingress-auth-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ee-gcp-sm
    kind: ClusterSecretStore
  target:
    name: ingress-auth-secret
    creationPolicy: Owner
  data:
    - secretKey: auth
      remoteRef:
        key: tidbx-ops-client-tibuild-v2-basic-auth
