apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: httproute-auth-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: ee-gcp-sm
  target:
    name: httproute-auth-secret
    creationPolicy: Owner
  data:
    # Envoy Gateway only accepts htpasswd entries in {SHA} format here.
    # Rotate the GCP Secret Manager payload with:
    # htpasswd -nbs <username> <password> | gcloud secrets versions add cloudevents-basic-auth --data-file=-
    - secretKey: ".htpasswd"
      remoteRef:
        key: cloudevents-basic-auth
