apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: publisher-ext-internal
spec:
  parentRefs:
    - kind: Gateway
      name: internal-gateway
      namespace: infra
  hostnames:
    - internal2-do.pingcap.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /publisher
      backendRefs:
        - name: publisher
          port: 80
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: publisher-ext-external
spec:
  parentRefs:
    - kind: Gateway
      name: external-https
      namespace: infra
  hostnames:
    - do2.pingcap.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /publisher
      backendRefs:
        - name: publisher
          port: 80
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: publisher-ext-external
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: publisher-ext-external
  basicAuth:
    users:
      name: httproute-auth-secret
