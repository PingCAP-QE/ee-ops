apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: httproute-auth-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ee-gcp-sm
    kind: ClusterSecretStore
  target:
    name: httproute-auth-secret
    creationPolicy: Owner
  data:
    - secretKey: ".htpasswd"
      remoteRef:
        key: publisher-basic-auth
