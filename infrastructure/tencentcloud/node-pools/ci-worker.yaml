apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: ci-worker
spec:
  template:
    metadata:
      labels:
        compute-class: ci-worker
    spec:
      nodeClassRef:
        group: karpenter.k8s.tke
        kind: TKEMachineNodeClass
        name: ci-worker
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
            - arm64
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - C6
            - C5
            - SK1
            - S6
            - S5
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h
