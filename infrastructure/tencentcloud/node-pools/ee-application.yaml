apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: ee-application
spec:
  template:
    metadata:
      labels:
        compute-class: ee-application
    spec:
      expireAfter: 168h
      nodeClassRef:
        group: karpenter.k8s.tke
        kind: TKEMachineNodeClass
        name: ee-application
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - S6
            - S5
            - SA3
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m
