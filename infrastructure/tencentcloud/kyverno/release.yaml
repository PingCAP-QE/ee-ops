#yaml-language-server: $schema=https://github.com/fluxcd-community/flux2-schemas/raw/refs/heads/main/helmrelease-helm-v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
spec:
  interval: 5m
  chart:
    spec:
      chart: kyverno
      version: 3.4.4
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  values:
    global:
      nodeSelector:
        compute-class: system
      image:
        registry: ghcr.nju.edu.cn

    admissionController:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 3
    backgroundController:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
    cleanupController:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
    reportsController:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
