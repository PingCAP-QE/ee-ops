#yaml-language-server: $schema=https://github.com/fluxcd-community/flux2-schemas/raw/refs/heads/main/helmrelease-helm-v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
spec:
  interval: 5m
  chart:
    spec:
      chart: kyverno
      # renovate: datasource=helm depName=kyverno registryUrl=https://kyverno.github.io/kyverno/
      version: 3.8.2
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  values:
    global:
      nodeSelector:
        compute-class: system

    admissionController:
      container:
        image:
          registry: ghcr.nju.edu.cn
      initContainer:
        image:
          registry: ghcr.nju.edu.cn
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 3
    backgroundController:
      image:
        registry: ghcr.nju.edu.cn
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
    cleanupController:
      image:
        registry: ghcr.nju.edu.cn
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
    reportsController:
      image:
        registry: ghcr.nju.edu.cn
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
    policyReportsCleanup:
      image:
        registry: mirror.ccs.tencentyun.com
        tag: latest
    crds:
      migration:
        image:
          registry: ghcr.nju.edu.cn
