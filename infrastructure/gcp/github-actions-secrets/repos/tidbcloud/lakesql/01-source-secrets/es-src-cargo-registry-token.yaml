apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: es-src-cargo-registry-token
  labels:
    ee.pingcap.com/owner-team: ee
    ee.pingcap.com/github-org: tidbcloud
  annotations:
    ee.pingcap.com/source-secret-id: gha__env__tidbcloud__lakesql__release-crates__cargo_registry_token
    ee.pingcap.com/github-secret-name: CARGO_REGISTRY_TOKEN
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-sm-github-actions
    kind: SecretStore
  target:
    name: src-cargo-registry-token
    creationPolicy: Owner
  data:
    - secretKey: value
      remoteRef:
        key: gha__env__tidbcloud__lakesql__release-crates__cargo_registry_token
