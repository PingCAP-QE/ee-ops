apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: ps-lakesql-package-apk-passphrase-release-s3
  labels:
    ee.pingcap.com/owner-team: platform
    ee.pingcap.com/managed-by: fluxcd
    ee.pingcap.com/github-org: tidbcloud
  annotations:
    ee.pingcap.com/github-secret-name: LAKESQL_PACKAGE_APK_PASSPHRASE
spec:
  deletionPolicy: Delete
  refreshInterval: 1h
  secretStoreRefs:
    - name: gh-env-tidbcloud-lakesql-release-s3
      kind: SecretStore
  selector:
    secret:
      name: src-lakesql-package-apk-passphrase
  data:
    - match:
        secretKey: value
        remoteRef:
          remoteKey: LAKESQL_PACKAGE_APK_PASSPHRASE
