apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-internal
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: wildcard-pingcap-net-http
      protocol: HTTP
      port: 80
      allowedRoutes:
        kinds:
          - group: gateway.networking.k8s.io
            kind: HTTPRoute
        namespaces:
          from: All
---
apiVersion: v1
kind: Service
metadata:
  name: envoy-internal
  namespace: default
spec:
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  selector:
    gateway.envoyproxy.io/owning-gateway-name: "envoy-internal" # 你的 Envoy Gateway 名字
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gke-to-envoy-route
spec:
  parentRefs:
    - name: external-https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /debug
      backendRefs:
        - name: envoy-internal
          port: 80
