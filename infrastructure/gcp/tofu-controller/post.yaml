---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: tofu-controller-post
spec:
  targetNamespace: infra
  dependsOn:
    - name: tofu-controller-release
  interval: 30m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/gcp/tofu-controller/post
  prune: true
