apiVersion: cloud.google.com/v1
kind: ComputeClass
metadata:
  name: ci-worker
spec:
  nodePoolAutoCreation:
    enabled: true
  whenUnsatisfiable: DoNotScaleUp
  priorityDefaults:
    location:
      locationPolicy: ANY
      zoneTypes: [STANDARD]
  priorities:
    # --------- spot types -----------
    - machineFamily: c4d
      priorityScore: 100
      spot: true
      storage:
        bootDiskType: hyperdisk-balanced
        bootDiskSize: 100
    - machineFamily: c4
      priorityScore: 90
      spot: true
      storage:
        bootDiskType: hyperdisk-balanced
        bootDiskSize: 100
    - machineFamily: c4a # Arm64
      priorityScore: 85
      spot: true
      storage:
        bootDiskType: hyperdisk-balanced
        bootDiskSize: 100
    - machineFamily: n4a # Arm64
      priorityScore: 75
      spot: true
      storage:
        bootDiskType: hyperdisk-balanced
        bootDiskSize: 100
    - machineFamily: c3
      priorityScore: 60
      spot: true
      storage:
        bootDiskType: hyperdisk-balanced
        bootDiskSize: 100
    - machineFamily: c3d
      priorityScore: 55
      spot: true
      storage:
        bootDiskType: hyperdisk-balanced
        bootDiskSize: 100

    # --------- on-demand types -----------
    - machineFamily: c4d
      priorityScore: 50
      spot: false
      storage:
        bootDiskType: hyperdisk-balanced
    - machineFamily: c4
      priorityScore: 40
      spot: false
      storage:
        bootDiskType: hyperdisk-balanced
        bootDiskSize: 100
    - machineFamily: c4a # Arm64
      priorityScore: 40
      spot: false
      storage:
        bootDiskType: hyperdisk-balanced
        bootDiskSize: 100
    - machineFamily: n4a # Arm64
      priorityScore: 35
      spot: false
      storage:
        bootDiskType: hyperdisk-balanced
        bootDiskSize: 100
    - machineFamily: c3
      priorityScore: 25
      spot: false
      storage:
        bootDiskType: hyperdisk-balanced
        bootDiskSize: 100
    - machineFamily: c3d
      priorityScore: 20
      spot: false
      storage:
        bootDiskType: hyperdisk-balanced
        bootDiskSize: 100
