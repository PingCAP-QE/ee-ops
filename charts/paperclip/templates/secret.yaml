{{- if and (eq .Values.paperclip.deploymentMode "authenticated") (not .Values.auth.existingSecret) -}}
{{- $secretName := include "paperclip.authSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $secretKey := .Values.auth.secretKey -}}
{{- $secretValue := "" -}}
{{- if .Values.auth.secretValue -}}
{{- $secretValue = .Values.auth.secretValue -}}
{{- else if and $existing (hasKey $existing.data $secretKey) -}}
{{- $secretValue = (index $existing.data $secretKey | b64dec) -}}
{{- else -}}
{{- $secretValue = randAlphaNum 48 -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $secretKey }}: {{ $secretValue | quote }}
{{- end }}
