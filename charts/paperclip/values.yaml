replicaCount: 1

image:
  repository: ghcr.io/paperclipai/paperclip
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

command: []
args: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

paperclip:
  host: 0.0.0.0
  port: 3100
  serveUI: true
  home: /paperclip
  instanceId: default
  deploymentMode: authenticated
  deploymentExposure: private
  publicUrl: ""
  allowedHostnames: []
  extraEnv: []

auth:
  existingSecret: ""
  secretKey: BETTER_AUTH_SECRET
  secretValue: ""

config:
  existingSecret: ""
  secretKey: config.json
  mountPath: ""

envFrom: []

service:
  type: ClusterIP
  port: 3100

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - kind: Gateway
      name: internal-gateway
      namespace: infra
      sectionName: wildcard-pingcap-net
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

resources: {}

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 6

persistence:
  enabled: true
  existingClaim: ""
  storageClass: ""
  annotations: {}
  labels: {}
  accessMode: ReadWriteOnce
  size: 20Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

extraVolumes: []
extraVolumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
